name: cu-targeting
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults

dependencies:
  # Python
  - python=3.11

  # Geoespacial core (conda para evitar conflito de DLLs no Windows)
  - gdal=3.8
  - rasterio=1.3
  - geopandas=0.14
  - fiona=1.9
  - pyproj=3.6
  - shapely=2.0
  - xarray=2024.2
  - rioxarray=0.15
  - pyogrio=0.7
  - scipy=1.12

  # PyTorch com CUDA 12.1 para RTX 4090
  - pytorch=2.2
  - torchvision=0.17
  - pytorch-cuda=12.1

  # Dados / download
  - pystac-client=0.7
  - stackstac=0.5
  - aiohttp=3.9
  - aiofiles=23.2
  - tqdm=4.66
  - requests=2.31

  # ML / treino
  - lightgbm=4.3
  - scikit-learn=1.4
  - numpy=1.26
  - pandas=2.2
  - joblib=1.3

  # Visualização / output
  - matplotlib=3.8
  - folium=0.15
  - branca=0.7

  # Config / utils
  - pyyaml=6.0
  - rich=13.7
  - loguru=0.7
  - click=8.1
  - python-dotenv=1.0

  # Jupyter (opcional para exploração)
  - jupyterlab=4.1
  - ipywidgets=8.1

  # pip para pacotes sem conda
  - pip
  - pip:
      # Prithvi / HuggingFace
      - transformers==4.40.0
      - huggingface-hub==0.22.2
      - timm==0.9.16
      - einops==0.7.0
      - safetensors==0.4.3

      # Microsoft Planetary Computer
      - planetary-computer==1.0.0
      - odc-stac==0.3.9

      # Interpolação geoquímica
      - pykrige==1.7.1

      # Otimização hiperparâmetros
      - optuna==3.6.1
      - optuna-integration==3.6.0

      # Interpretabilidade
      - shap==0.45.0

      # Paralelismo de agentes
      - concurrent-log-handler==0.9.25
      - tenacity==8.2.3

      # Output profissional
      - contextily==1.6.0
